# Three-replica backend behind an nginx round-robin load balancer.
# Scale by editing `deploy.replicas` (Swarm) or `--scale api=N` (compose v2):
#
#   docker compose up --build --scale api=5
#
# Volumes:
#   corpus/  shared append-only JSONL training corpus across all replicas.
#   data/    SQLite auth/history database (single replica owns it; nginx pins
#            requests to a sticky upstream when AUTH_DB is enabled).

services:
  api:
    build: ./server
    env_file: ./server/.env
    environment:
      - PORT=8787
      - CORPUS_DIR=/data/corpus
      - AUTH_DB=/data/auth.sqlite
    volumes:
      - corpus:/data/corpus
      - authdb:/data
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 3

  lb:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8787:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  corpus:
  authdb:
