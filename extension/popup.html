<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">Q</div>
      <div>
        <div class="title">Qrammerly</div>
        <div class="sub" id="status">Idle</div>
      </div>
    </header>

    <section class="panel">
      <textarea id="input" placeholder="Paste text to proofread…"></textarea>
      <div class="row">
        <button id="check">Check</button>
        <span class="meta" id="meta"></span>
      </div>
    </section>

    <section class="panel" id="results"></section>

    <section class="panel settings">
      <label>API endpoint</label>
      <input id="endpoint" type="text" placeholder="http://localhost:8787/v1/check" />
      <button id="save" class="ghost">Save</button>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
