<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">Q</div>
      <div>
        <div class="title">Qrammerly</div>
        <div class="sub" id="status">Idle</div>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="check">Check</button>
      <button class="tab" data-tab="keys">Keys &amp; Models</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <section class="panel" data-pane="check">
      <textarea id="input" placeholder="Paste text to proofread…"></textarea>
      <div class="row">
        <button id="check" class="primary">Check</button>
        <span class="meta" id="meta"></span>
      </div>
      <div class="row paragraph-nav hidden" id="paragraph-nav">
        <button id="prev-para" class="ghost">‹ Prev paragraph</button>
        <span class="meta" id="para-counter"></span>
        <button id="next-para" class="ghost">Next paragraph ›</button>
      </div>
      <div id="paragraph-preview" class="paragraph-preview hidden"></div>
      <div id="results"></div>
      <div class="row issue-nav hidden" id="issue-nav">
        <button id="prev-issue" class="ghost">‹ Prev</button>
        <span class="meta" id="issue-counter"></span>
        <button id="next-issue" class="ghost">Next ›</button>
      </div>
    </section>

    <section class="panel hidden" data-pane="keys">
      <p class="hint">Keys and models are stored on this device only. Models are optional — leave empty to use the provider's default.</p>
      <div id="keygrid" class="keygrid"></div>
      <button id="save-keys" class="primary">Save</button>
    </section>

    <section class="panel hidden" data-pane="settings">
      <label class="field">API endpoint
        <input id="endpoint" type="text" placeholder="https://qrammerly.com/v1/check" />
      </label>
      <button id="save-endpoint" class="primary">Save</button>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
