worker_processes auto;
events { worker_connections 1024; }

http {
  # Resolve "api" via Docker's embedded DNS so we always see all replicas.
  resolver 127.0.0.11 ipv6=off valid=10s;

  upstream qrammarly_api {
    # least_conn balances long-tail requests better than round-robin when one
    # provider in the fan-out is slow.
    least_conn;
    server api:8787 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  log_format json escape=json
    '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"path":"$request_uri","status":$status,"upstream":"$upstream_addr",'
    '"rt":$request_time,"urt":$upstream_response_time}';

  access_log /var/log/nginx/access.log json;

  server {
    listen 80;
    server_name _;

    # Health endpoint hits any replica.
    location /v1/health {
      proxy_pass http://qrammarly_api;
      proxy_set_header Host $host;
    }

    # Auth-bearing routes pin to one replica per session via ip_hash so the
    # SQLite-backed user history is consistent. See `map` below.
    location /v1/ {
      proxy_pass http://qrammarly_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }
  }
}
